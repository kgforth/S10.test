<!DOCTYPE html>
<html>

<head>
    <title>S10.test</title> 
<link rel="stylesheet" type="text/css" href="webix.css">
<script type="text/javascript" src="webix.js"></script>
<style> .tpred { color: #EC3774; background: #fff; border: .4em solid; border-color: rgb(256,256,256); margin: 0 0 0 -.4em;}</style>
<style> .tpblue { color: #00ccff; background: #fff; border: .4em solid; border-color: rgb(256,256,256); margin: 0 0 0 -.4em;}</style>
<style> .tpyellow { color: #e9df40; background: #fff; border: .4em solid; border-color: rgb(256,256,256); margin: 0 0 0 -.4em;}</style>
</head>

<body>

<script type="text/javascript">

// 1. Сразу сообщаем букмарклету, что мы открылись
if (window.opener) {
    window.opener.postMessage("PARSER_READY", "*");
} else {
    document.body.innerHTML = "<h2 style='color:red'>Запустите букмарклет на сайте S10.run!</h2>";
}

// Глобальная переменная для хранения последнего полученного HTML
window.lastHtml = "";

// 2. Обработка входящих сообщений
window.addEventListener("message", (event) => {
    const data = event.data;

    // Шаг А: Проверка URL от букмарклета (первичная)
    if (data.type === "CHECK_URL") {
        const url = data.url;
        // Проверка: содержит s10.run и слово student
        const isValid = /s10\.run\/student/.test(url);

        if (isValid) {
            console.log("URL подтвержден:", url);
            event.source.postMessage({ type: "START_FETCH" }, event.origin);
        } else {
            alert("Ошибка: Пожалуйста, перейдите на страницу студента S10.run");
        }
    }

    // Шаг Б: Получение данных (HTML)
    if (data.type === "DATA_PAYLOAD") {
        window.lastHtml = data.text;
        console.log("Данные получены для URL:", data.url);
        console.log("Размер данных:", data.text.length, "символов");
        
        // Здесь можно вызвать твою функцию парсинга, например:
        // myParseFunction(data.text);
    }

    // Шаг В: Обработка ошибок загрузки
    if (data.type === "FETCH_ERROR") {
        console.error("Ошибка загрузки URL:", data.url, "Текст ошибки:", data.error);
        alert("Не удалось загрузить данные: " + data.error);
    }
});

/**
 * ФУНКЦИЯ ДЛЯ ВЫЗОВА ИЗ КОНСОЛИ ИЛИ ИНТЕРФЕЙСА ПАРСЕРА
 * Запрашивает данные любого студента по ID
 */
function loadStudentById(studentId) {
    const targetUrl = `https://s10.run{studentId}&v2=1#/`;
    if (window.opener) {
        console.log("Запрос данных студента:", studentId);
        window.opener.postMessage({ type: "FETCH_SPECIFIC_URL", url: targetUrl }, "*");
    } else {
        alert("Связь с родительским окном потеряна!");
    }
}


</script>

</body>

</html>
