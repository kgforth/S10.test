function extractId() {
  var text = $$(searchId).getValue();
  if (!text) return webix.message("Поле пустое");

  // Регулярка: ищет цифры между двумя символами #
  var match = text.match(/#(\d+)#/);
  
  if (match && match[1]) {
    var resultId = match[1]; // Это наша переменная с номером
    webix.message({ type: "debug", text: "Извлечен ID: " + resultId });
//    console.log("Найденный ID:", resultId);
    
	lastId = resultId;
	
    loadStudentById(lastId);
	
    // Здесь можно вызвать дальнейшую логику с этим resultId
  } else {
    webix.message({ type: "error", text: "Формат #номер# не найден" });
  }
}

function addItem() {
  var search = $$(searchId);
  var text = search.getValue();
  if (!text || text.trim() === "") return;

  var list = $$(listId);
  var exists = list.find(obj => obj.value.toLowerCase() === text.toLowerCase(), true);

  if (!exists) {
    list.add({ value: text });
    saveData();
    webix.message("Добавлено: " + text);
  } else {
    webix.message("Уже в списке");
  }
}

function removeItem() {
  var text = $$(searchId).getValue();
  var item = $$(listId).find(obj => obj.value == text, true);
  if (item) {
    webix.confirm("Удалить '" + text + "'?", r => {
      if (r) {
        $$(listId).remove(item.id);
        $$(searchId).setValue("");
        saveData();
      }
    });
  } else {
    webix.message("Элемент не найден");
  }
}

function clearAllData() {
  webix.confirm("Очистить всё?", r => {
    if (r) {
      webix.storage.local.remove("my_final_data");
      $$(listId).clearAll();
      $$(searchId).setValue("");
    }
  });
}

function saveData() {
  webix.storage.local.put("my_final_data", $$(listId).serialize());
}

function loadData() {
  var data = webix.storage.local.get("my_final_data");
  if (data) $$(listId).parse(data);
}
		
function addItemEx(inputValue) {
  // 1. Проверяем, что входная строка не пустая
  if (!inputValue || inputValue.trim() === "") return;

  var list = $$(listId);
  var text = inputValue.trim();

  // 2. Проверяем на дубликаты в списке (без учета регистра)
  var exists = list.find(obj => obj.value.toLowerCase() === text.toLowerCase(), true);

  if (!exists) {
    // 3. Добавляем в список
    var newId = list.add({ value: text });
    
    // 4. Сохраняем обновленный список в localStorage
    saveData();
    
    // 5. Опционально: сразу выбираем добавленное значение в поле поиска
    $$(searchId).setValue(text);
    
    webix.message("Добавлено: " + text);
    return newId; // возвращаем ID новой записи
  } else {
    // Если уже есть, просто выбираем этот элемент
    $$(searchId).setValue(exists.value);
    webix.message("Уже есть в списке");
    return exists.id;
  }
}

function alignWindows() {
    let winIds = ["com1", "com2", "com3"];
    let activeWins = winIds.filter(id => $$(id) && $$(id).isVisible());
    let count = activeWins.length;
    
    if (!count) return;

    let screenWidth = window.innerWidth;
    let winHeight = 750; // Твоя высота

    activeWins.forEach((id, index) => {
        let win = $$(id);
        let winWidth, posX;

        if (count === 1) {
            // ПРАВИЛО 1: Одно окно — не более половины ширины, по центру
            winWidth = Math.min(screenWidth / 2, 800); // Ограничим еще и максимумом на всякий
            posX = (screenWidth - winWidth) / 2;
        } 
        else if (count === 2) {
            // ПРАВИЛО 2: Два окна — отступы от краев по 30px
            let margin = 30;
            let gap = 8; // зазор между окнами
            winWidth = (screenWidth - (margin * 2) - gap) / 2;
            posX = margin + (index * (winWidth + gap));
        } 
        else if (count === 3) {
            // ПРАВИЛО 3: Три окна — отступы от краев по 10px
            let margin = 10;
            let gap = 8; // зазор между окнами
            winWidth = (screenWidth - (margin * 2) - (gap * 2)) / 3;
            posX = margin + (index * (winWidth + gap));
        }

        // Применяем размеры
        win.define("width", winWidth);
        win.define("height", winHeight);
        win.resize();

        // Ставим в позицию (Y можно оставить фиксированным, например 100)
        win.setPosition(posX, 100);
    });
}


function checkVisibility(chartId, seriesIndex) {

    const item = $$(chartId).$view.querySelector(selector);
    
    if (item) {
        return !item.classList.contains("hidden");
    }
    return false;
}

function Valid_Ttype(d,r,t) {
  try {

if ( r === 0 ) return t ; 

 t="";
switch (d[0].studentTasksInfo.diaryTasks[r].type) {
  case 0:
    t = ""; // отдых
    break;
  case 1:
    t = "Восстановительная";
    break;
  case 2:
    t = "Развивающая";
    break;
  case 3:
    t = "Интервальная";
    break;
  case 4:
    t = "Повторная";
    break;
  case 5:
    t = "Длительная";
    break;
  case 6:
    t = "Соревнование";
    break;
  case 7:
    t = "Силовая";
    break;		
  default:
    t = ""; // Handles unexpected values
}
    return t;

  } catch {
    return t;
  }
}

function Valid_Pace(d,r,s,t) {
  try {
			const tmp = [];
			for(var i=0; i < d[0].studentTasksInfo.diaryTasks[r].tracks.length ; i++){
			for(var j=0; j < d[0].studentTasksInfo.diaryTasks[r].tracks[i].json.splits_metric.length-1 ; j++){
			tmp.push(d[0].studentTasksInfo.diaryTasks[r].tracks[i].json.splits_metric[j].average_speed);
				}
			}	  
            
            num=(1000/tmp[s])/60;			
			
            return ((Math.round(num * 100) / 100) + 0.01) * -1; 



  } catch {
  
      try {

 

 
const tmp = [];
 for(var i=0; i < d[0].studentTasksInfo.diaryTasks[r].tracks.length ; i++){
 for(var j=0; j < d[0].studentTasksInfo.diaryTasks[r].tracks[i].json.segments.length ; j++){
 tmp.push(d[0].studentTasksInfo.diaryTasks[r].tracks[i].json.segments[j].pace);
 }
}
        return tmp[s] * -1;
 

  } catch {





      try {

			const tmp = [];
			for(var i=0; i < d[0].studentTasksInfo.diaryTasks[r].tracks.length ; i++){
			for(var j=0; j < d[0].studentTasksInfo.diaryTasks[r].tracks[i].json.laps.length-1 ; j++){
			tmp.push(d[0].studentTasksInfo.diaryTasks[r].tracks[i].json.laps[j].average_speed);
				}
			}	  
            
            num=(1000/tmp[s])/60;			
			
//			return num.toFixed(2);
            return ((Math.round(num * 100) / 100) + 0.01) * -1; 
			
           } catch {

	       	return t;

	
	      }
    
	return t;
  }  
  }
}

  var ss = 0;
}

  var mm = 0;
}
if (timeStr.length > 6) {
  var hh = parseInt(timeStr.substr(-8,2), 10);
} else {
  var hh = 0;
}

 
 return ((hh*60*60)+(mm*60)+ss)/60;
}

}
